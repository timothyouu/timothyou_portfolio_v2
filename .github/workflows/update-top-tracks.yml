name: Update top tracks

on:
  schedule:
    # Daily at 12:00 UTC (~5am PT). Commits only when the top 5 actually change.
    - cron: "0 12 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # needed to commit the refreshed JSON

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch top tracks
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: timothyou # public username, not a secret
        run: python scripts/update_top_tracks.py

      - name: Commit and push
        run: |
          git config user.name "Timothy Ou"
          git config user.email "timothyou02@gmail.com"
          git add data/v2/top-tracks.json
          git commit -m "chore: refresh top tracks" || echo "Nothing to commit."
          git push
