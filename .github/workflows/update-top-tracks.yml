name: Update top tracks

on:
  schedule:
    # Every Monday at 12:00 UTC (~5am PT). Weekly cadence.
    - cron: "0 12 * * 1"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # needed to commit the refreshed JSON

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch top tracks
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
        run: python scripts/update_top_tracks.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/v2/top-tracks.json; then
            echo "No change in top tracks — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/v2/top-tracks.json
          git commit -m "chore: refresh Spotify top tracks"
          git push
